    <link rel="stylesheet" href="style.css">
    <style>
    /* сітка для тем */
    .topics-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    }

    /* квадратна картка теми */
    .topic-card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    width: 180px;
    height: 180px;
    padding: 15px;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.2s, box-shadow 0.2s;
    }

    .topic-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.25);
    }

    .topic-card h3 {
    color: #6a1b9a;
    font-size: 18px;
    margin: 10px 0;
    }

    .topic-card p {
    color: #333;
    font-size: 14px;
    margin: 0;
    }

    .topic-card button {
    padding: 8px 0;
    font-size: 14px;
    border-radius: 6px;
    }
    </style>
    </head>
